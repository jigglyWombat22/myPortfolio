<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>

  <style>
    .body{
      justify-content: center;
      display: flex;
      flex-direction: column; 
      height: 450px;
      width: 300px;
      margin-top:50px;
      margin-left:500px;
      padding-bottom: 30px;
      background-color: hsla(200, 2%, 28%, 0.918);
      border-radius: 10px;
      font-size: 2rem;
      font-family: Arial, sans-serif;
    }
    p{
      height: 2000px;
      margin-left:60px;
      font-size: 2rem;
      color: #fff;
    }

    button{
      border-radius: 50px;
      border: none;
      cursor: pointer;
      margin-left: 15px;
      background-color: #292222;
      color: #fff;
      height:50px;
      width: 50px;
      margin-bottom: 7px;
      font-weight: bold;
    
    }
    .operators{
      background-color: hsl(32, 92%, 48%);
      color: #000000;
    }

    .operators:hover{
      background-color: hsl(27, 92%, 36%);
      color: #fff;
    }
    button:hover{
      background-color: hsl(0, 0%, 100%);
      color: #2c2929;
    }
    button:active{
      background-color: hsl(0, 2%, 24%);
      color: #fff
    }
    .operators:active{
      background-color: hsl(32, 86%, 59%);
      color: #fff;
    }

    #display{
      border-radius: 5px;
      background-color: rgb(255, 255, 255);
      color: rgb(0, 0, 0);
      height: 1500px;
      width: 250px;
      margin-left: 18px;
      margin-bottom: 10px;
      font-size: 1.5rem;
      text-align: right;
      border: none;
    }
    
  </style>
</head>

<body>
<div class="body">
  <p>Calculator</p>
    <input id="display" type="text" readonly>
  <div class="buttons">
    <button class="operators" onclick="clearDisplay()">AC</button>
    <button class="operators" onclick="deleteLast()">⌫</button>
    <br>
    <button onclick="addValue('7')">7</button>
    <button onclick="addValue('8')">8</button>
    <button onclick="addValue('9')">9</button>
    <button class="operators" onclick="addValue('/')">÷</button>
    <br>
    <button onclick="addValue('4')">4</button>
    <button onclick="addValue('5')">5</button>
    <button onclick="addValue('6')">6</button>
    <button class="operators" onclick="addValue('*')">x</button>
    <br>
    <button onclick="addValue('1')">1</button>
    <button onclick="addValue('2')">2</button>
    <button onclick="addValue('3')">3</button>
    <button class="operators" onclick="addValue('-')">-</button>
    <br>
    <button onclick="addValue('.')">.</button>
    <button onclick="addValue('0')">0</button>
    <button class="operators" onclick="calculate()">=</button>
    <button class="operators" onclick="addValue('+')">+</button>
  </div>
</div>

  <script>
const display = document.getElementById("display");

function addValue(input){
  display.value += input;
}

function clearDisplay(){
  display.value = "";
}

function deleteLast(){
  display.value = display.value.slice(0, -1);
}

function calculate(){
  try{
    display.value = eval(display.value);
  } catch (error) {
    display.value = "Error";
  }
}
  </script>
</body>
</html>
